spring:
  application:
    name: yesandaero_backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:yesandaero}
    username: ${POSTGRES_USER:yesandaero}
    password: ${POSTGRES_PASSWORD:yesandaero}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      password: ${REDIS_PASSWORD:yesandaero}

jwt:
  secret: ${JWT_SECRET:local-development-secret-key-please-change-in-production-0123456789}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:1209600000}
